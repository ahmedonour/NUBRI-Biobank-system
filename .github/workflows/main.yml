name: Build & Release

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install flake8
      - run: flake8 main.py app/ --max-line-length=120 --ignore=E128,E501,W503

  build:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install zbar

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: python build_app.py --name "BioBank DB"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent "dist/BioBank DB.app" "dist/BioBank-DB-macOS.zip"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "dist/BioBank DB" -DestinationPath "dist/BioBank-DB-Windows.zip"
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BioBank-DB-${{ runner.os }}
          path: dist/BioBank-DB-*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - uses: ncipollo/release-action@v1
        with:
          artifacts: "release-artifacts/*/*.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          makeLatest: true
